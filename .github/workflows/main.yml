name: Génération du sitemap et déploiement

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Générer le sitemap
        run: python sitemap2.py

      - name: Vérifier que le sitemap a été généré
        run: |
          if [ ! -f sitemap-docs.xml ]; then
            echo "Erreur : sitemap-docs.xml est introuvable"
            exit 1
          fi
          ls -l sitemap-docs.xml

      - name: Publier dans gh-pages via token
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir temp-clone
          cd temp-clone

          git clone https://x-access-token:${GH_TOKEN}@github.com/MohamedOpenpaye/sitemap2.git .

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            rm -rf ./*
            echo "<h1>Sitemap en ligne</h1>" > index.html
            git add index.html
            git commit -m "Initialiser gh-pages"
            git push origin gh-pages
          fi

          cp ../sitemap-docs.xml ./sitemap-docs.xml
          git add sitemap-docs.xml

          if git diff --cached --quiet; then
            echo "Aucune modification à publier"
          else
            git commit -m "MAJ automatique du sitemap"
            git push origin gh-pages
          fi

          cp ../sitemap-docs.xml ./sitemap-docs.xml
          git add sitemap-docs.xml

          if git diff --cached --quiet; then
            echo "Aucune modification à publier"
          else
            git commit -m "MAJ automatique du sitemap"
            git push origin gh-pages
          fi
